<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Daily Journal</title>

<link rel="stylesheet" href="dailyjournal.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
rel="stylesheet">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<div class="app">

    <div class="title">
        Daily Journal 📔
    </div>

    <div class="subtitle">
        Write your thoughts today
    </div>

    <div class="journal-box">

        <textarea id="journalInput"
        placeholder="Write anything here..."></textarea>

        <button class="save-btn"
        id="saveJournalBtn">
            Save Journal
        </button>

        <div class="saved-text"
        id="savedText"></div>

    </div>


</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="dailyjournal.js"></script>

</body>
</html>
