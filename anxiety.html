<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Social Anxiety Room</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="anxiety.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<div class="app">

    <!-- HEADER -->
    <div class="header teal">
        <i class="fa-solid fa-users"></i>
        <h1 id="roomTitle">Social Anxiety Room</h1>
    </div>

    <!-- POSTS -->
    <div class="post-list" id="postList">

        <div class="post">
            <h3>Hidden Voice</h3>
            <p>I overthink every message I send...</p>
            <div class="actions">❤️ 18 • 💬 6</div>
        </div>

        <div class="post">
            <h3>Quiet Mind</h3>
            <p>Talking to strangers still scares me.</p>
            <div class="actions">❤️ 10 • 💬 2</div>
        </div>

    </div>

    <!-- INPUT -->
    <div class="input-bar">
        <input type="text" id="postInput" placeholder="Share your thoughts...">
        <button id="postBtn">Post</button>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="anxiety.js"></script>

<script>
    $("#roomTitle").text("Social Anxiety Room");
</script>

</body>
</html>
