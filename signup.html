<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Advice - Sign Up</title>

    <link rel="stylesheet" href="stylepage2.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <div class="main-wrapper">

        <!-- BACK BUTTON -->
        <div class="header-nav">
            <a href="index.html" class="back-btn">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
        </div>

        <!-- LOGO -->
        <div class="logo-container small">
            <img src="logo cloudy.png" class="app-logo-small" alt="logo">
        </div>

        <!-- FORM SECTION -->
        <div class="content">

            <h2>Create Account</h2>

            <form id="signupForm">

                <!-- EMAIL -->
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="hello@example.com">
                </div>

                <!-- PASSWORD -->
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="********">
                </div>

                <!-- AGE -->
                <div class="input-group">
                    <label>Your Age</label>
                    <input type="number" id="age" placeholder="21">
                </div>

                <!-- SUBMIT BUTTON -->
                <button type="submit" class="btn-primary">
                    Sign Up
                </button>

            </form>

            <!-- FOOTER TEXT -->
            <p class="footer-quote">
                "Your identity is always private."
            </p>

        </div>

    </div>

    <!-- SCRIPTS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="scriptpage2.js"></script>

</body>
</html>
