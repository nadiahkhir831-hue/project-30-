<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Worklife Room</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="stylework.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>

<div class="app">

    <!-- HEADER -->
    <div class="header" id="roomHeader">
        <i class="fa-solid fa-heart"></i>
        <h1 id="roomTitle">Work Life Room</h1>
    </div>

    <!-- POSTS -->
    <div class="post-list" id="postList">

        <div class="post">
            <h3>Anonymous</h3>
            <p>Welcome to the room 👋</p>
            <div class="actions">❤️ 0 • 💬 0</div>
        </div>

    </div>

    <!-- INPUT -->
    <div class="input-bar">
        <input type="text" id="postInput" placeholder="Write anonymously...">
        <button id="postBtn">Post</button>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="worklife.js"></script>

</body>
</html>
